version: "3.9"

services:
  backend:
    image: python:3.11-slim
    env_file:
      - ./backend/.env
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host $${API_HOST:-0.0.0.0} --port $${API_PORT:-8000} --reload"
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    env_file:
      - ./frontend/.env
    command: sh -c "npm install && npm run dev -- --host $${VITE_DEV_HOST:-0.0.0.0} --port $${VITE_DEV_PORT:-5173}"
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
